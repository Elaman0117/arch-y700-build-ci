name: Diagnose Runner Kernel

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Kernel version
        run: uname -a

      - name: Available filesystems
        run: |
          set +e
          echo "=== /proc/filesystems (before modprobe) ==="
          cat /proc/filesystems
          echo ""
          echo "=== grep f2fs in /proc/filesystems ==="
          grep f2fs /proc/filesystems || echo "f2fs NOT in /proc/filesystems"
          echo ""
          echo "=== modprobe f2fs ==="
          sudo modprobe f2fs 2>&1
          echo "modprobe exit code: $?"
          echo ""
          echo "=== /proc/filesystems (after modprobe) ==="
          cat /proc/filesystems
          echo ""
          echo "=== grep f2fs after modprobe ==="
          grep f2fs /proc/filesystems || echo "f2fs STILL NOT in /proc/filesystems"
          echo ""
          echo "=== find f2fs.ko ==="
          find /lib/modules/$(uname -r) -name 'f2fs*' 2>/dev/null
          echo "find exit code: $?"
          echo ""
          echo "=== ls /lib/modules ==="
          ls /lib/modules/ 2>/dev/null
          echo ""
          echo "=== mkfs.f2fs version ==="
          mkfs.f2fs -V 2>&1
          echo ""
          echo "=== Test mount f2fs ==="
          truncate -s 256M /tmp/test-f2fs.img
          sudo mkfs.f2fs -f /tmp/test-f2fs.img 2>&1
          sudo mkdir -p /mnt/test-f2fs
          sudo mount -o loop /tmp/test-f2fs.img /mnt/test-f2fs 2>&1
          MOUNT_RC=$?
          echo "mount exit code: $MOUNT_RC"
          if [ $MOUNT_RC -eq 0 ]; then
            echo "MOUNT OK - f2fs is usable!"
            sudo umount /mnt/test-f2fs
          else
            echo "MOUNT FAILED - f2fs not supported by kernel"
          fi
          rm -f /tmp/test-f2fs.img
          exit 0
