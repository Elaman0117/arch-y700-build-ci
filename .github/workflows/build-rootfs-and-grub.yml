name: Build Arch Y700 RootFS And GRUB

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create/upload. Empty disables release upload.
        required: false
        type: string
      output_prefix:
        description: Output artifact prefix
        required: true
        default: arch-y700-armv8
        type: string
      rootfs_config:
        description: Rootfs config as KEY=value lines
        required: true
        type: string
        default: |
          ARCH=aarch64
          ROOTFS_TARBALL_URL=https://archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
          PACMAN_MIRROR=http://mirror.archlinuxarm.org
          ARCH_LINUXARM_REPO=$arch/$repo
          ROOTFS_IMAGE_SIZE=20G
          ROOTFS_FSTYPE=ext4
          ROOTFS_F2FS_OPTIONS=-O extra_attr,inode_checksum,sb_checksum,compression
          ROOTFS_UUID=
          ROOTFS_LABEL=Y700ARCH
          ROOTFS_PARTLABEL=userdata
          HOSTNAME_NAME=y700
          DEFAULT_USER_NAME=y700
          DEFAULT_USER_PASSWORD=1234
          ROOT_PASSWORD_MODE=locked
          ROOT_PASSWORD=
          USER_SUDO_MODE=password
          TZ_REGION=Asia/Shanghai
          LANG_NAME=zh_CN.UTF-8
          LOCALES=en_US.UTF-8 UTF-8
          PACKAGE_LIST=
          DESKTOP_ENV=plasma-desktop sddm
          OVERLAY_ARCHIVE=
          PKG_ARCHIVE=
          BUILD_Y700_SENSOR_STAGE=1
          SENSOR_SOURCE_ARCHIVE=
          SENSOR_BASELINE_OVERLAY_ARCHIVE=
          SENSOR_STAGE_VERSION=20260626.1
          SENSOR_STRIP=1
          BUILD_TB321FU_HAPTICS_STAGE=1
          HAPTICS_SOURCE_ARCHIVE=
          KERNEL_SOURCE_ARCHIVE=
          KERNEL_BUILD_ARCHIVE=
          HAPTICS_STAGE_VERSION=20260627.1
          HAPTICS_STRIP=1
          BUILD_TB321FU_CAMERA_STACK=1
          CAMERA_STACK_ARCHIVE=
          CAMERA_STACK_STAGE_VERSION=20260627.4
          BUILD_TB321FU_GPU_SENSOR=1
          TB321FU_GPU_SENSOR_BUILD_JOBS=2
          INSTALL_GNOME_SNAPSHOT=1
          INSTALL_FCITX5_CHINESE=1
          APPLY_Y700_FIRMWARE_FIXES=1
          APPLY_Y700_AUDIO_POLICY_FIXES=1
          SDDM_AUTOLOGIN=0
          SDDM_AUTOLOGIN_SESSION=plasma
          MKINITCPIO_PRESETS=linux
          MKINITCPIO_MODULES=f2fs ext4 qcom_qmp_phy qcom_snps_femto_v2
          MKINITCPIO_HOOKS=base udev block autodetect keyboard keymap modconf filesystems fsck
          CLEAN_PACMAN_CACHE=1
          COMPRESS=7z
          CHUNK_SIZE=1500m
          KEEP_RAW_IMAGE=0
      boot_config:
        description: GRUB/FAT boot image config as KEY=value lines
        required: true
        type: string
        default: |
          BOOT_IMAGE_SIZE=512M
          BOOT_FAT_BITS=32
          BOOT_FAT_LABEL=Y700GRUB
          BOOT_SECTOR_SIZE=512
          BOOT_CLUSTER_SECTORS=
          BOOT_PARTLABEL=ESP
          ROOT_SELECTOR=partlabel
          ROOT_PARTLABEL=userdata
          ROOT_UUID=
          ROOTARGS=
          ROOTARGS_EXTRA=
          STABLEARGS=drm_client_lib.active=none
          GRUB_TIMEOUT=3
          INCLUDE_FALLBACK_KERNEL=1
          FALLBACK_KERNEL_VERSION=
          BOOT_COMPRESS=7z
          BOOT_CHUNK_SIZE=1500m
          KEEP_BOOT_IMAGE=0
      source_config:
        description: Input artifact URLs as KEY=value lines
        required: true
        type: string
        default: |
          KERNEL_ARTIFACT_ARCHIVE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-kernel-artifacts-7.1.1-g5df8e852ea72.tar.gz
          BOOTAA64_EFI_URL=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/BOOTAA64.EFI
          QCOMRAMP_EFI_URL=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/QCOMRAMP-CONFIGFILE.EFI
          QCOMRAMP_CFG_NAME=qcomramp.cfg
          GRUB_BUILD_ARCHIVE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-grub-build-arm64-efi.tar.gz
          DTB_NAME=sm8650-lenovo-tb321fu.dtb

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            dosfstools mtools f2fs-tools rsync curl unzip tar xz-utils zstd p7zip-full \
            gdisk qemu-utils sudo ca-certificates gnupg binutils \
            meson ninja-build pkg-config protobuf-c-compiler gcc-aarch64-linux-gnu \
            libglib2.0-dev:arm64 libqmi-glib-dev:arm64 libgudev-1.0-dev:arm64 libpolkit-gobject-1-dev:arm64 libprotobuf-c-dev:arm64 \
            arch-install-scripts

      - name: Apply workflow configuration
        run: |
          set -euo pipefail
          config_notes_dir="$RUNNER_TEMP/build-config-notes"
          mkdir -p "$config_notes_dir"
          cat > "$RUNNER_TEMP/rootfs.env" <<'CONFIG_EOF'
          ${{ inputs.rootfs_config }}
          CONFIG_EOF
          cat > "$RUNNER_TEMP/boot.env" <<'CONFIG_EOF'
          ${{ inputs.boot_config }}
          CONFIG_EOF
          cat > "$RUNNER_TEMP/source.env" <<'CONFIG_EOF'
          ${{ inputs.source_config }}
          CONFIG_EOF
          sed -i 's/^          //' "$RUNNER_TEMP/rootfs.env" "$RUNNER_TEMP/boot.env" "$RUNNER_TEMP/source.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/rootfs.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/boot.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/source.env"
          # Save redacted copies for release notes.
          sed -E 's/^((DEFAULT_USER_PASSWORD|ROOT_PASSWORD)=).*/\1<redacted>/' "$RUNNER_TEMP/rootfs.env" > "$config_notes_dir/rootfs.env"
          cp "$RUNNER_TEMP/boot.env" "$config_notes_dir/boot.env"
          cp "$RUNNER_TEMP/source.env" "$config_notes_dir/source.env"
          {
            echo 'OUTPUT_DIR_ROOTFS=out/ci-rootfs'
            echo 'OUTPUT_DIR_GRUB=out/ci-grub'
            echo 'OUTPUT_PREFIX<<EOF_OUTPUT_PREFIX'
            echo '${{ inputs.output_prefix }}'
            echo 'EOF_OUTPUT_PREFIX'
            echo "BUILD_CONFIG_NOTES_DIR=$config_notes_dir"
          } >> "$GITHUB_ENV"

      - name: Prepare GRUB build input
        run: |
          set -euo pipefail
          # GRUB_BUILD_ARCHIVE provides grub-mkstandalone + grub-core for building
          # QCOMRAMP.EFI from scratch. Optional when QCOMRAMP_EFI_URL is set (prebuilt).
          if [ -n "${GRUB_BUILD_ARCHIVE:-}" ]; then
            mkdir -p "$RUNNER_TEMP/grub-build"
            curl -fL --retry 3 -o "$RUNNER_TEMP/grub-build.tar" "$GRUB_BUILD_ARCHIVE"
            if ! tar -C "$RUNNER_TEMP/grub-build" -xf "$RUNNER_TEMP/grub-build.tar"; then
              tar -C "$RUNNER_TEMP/grub-build" -xzf "$RUNNER_TEMP/grub-build.tar"
            fi
            found=$(find "$RUNNER_TEMP/grub-build" -type f -name grub-mkstandalone -perm -111 | head -n1)
            if [ -n "$found" ]; then
              echo "Y700_GRUB_BUILD_DIR=$(dirname "$found")" >> "$GITHUB_ENV"
            else
              echo 'GRUB_BUILD_ARCHIVE did not contain grub-mkstandalone' >&2
              echo 'Y700_GRUB_BUILD_DIR=' >> "$GITHUB_ENV"
            fi
          else
            echo 'Y700_GRUB_BUILD_DIR=' >> "$GITHUB_ENV"
          fi
          # Either GRUB_BUILD_ARCHIVE or QCOMRAMP_EFI_URL must be available so
          # build-grub-image.sh can produce a QCOMRAMP.EFI (build or download).
          if [ -z "${GRUB_BUILD_ARCHIVE:-}" ] && [ -z "${QCOMRAMP_EFI_URL:-}" ]; then
            echo 'Either GRUB_BUILD_ARCHIVE or QCOMRAMP_EFI_URL must be set.' >&2
            exit 1
          fi

      - name: Build source sensor stage
        run: |
          set -euo pipefail
          if [ "${BUILD_Y700_SENSOR_STAGE:-0}" != "1" ]; then
            echo 'BUILD_Y700_SENSOR_STAGE is not 1; skipping.'
            echo 'SENSOR_STAGE_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${SENSOR_SOURCE_ARCHIVE:-}" ] && [ -z "${SENSOR_SOURCE_DIR:-}" ]; then
            echo 'No SENSOR_SOURCE_ARCHIVE/SENSOR_SOURCE_DIR provided; skipping source sensor stage build.'
            echo 'SENSOR_STAGE_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${SENSOR_BASELINE_OVERLAY_ARCHIVE:-}" ] && [ -z "${SENSOR_BASELINE_OVERLAY_DIR:-}" ]; then
            echo 'No SENSOR_BASELINE_OVERLAY_ARCHIVE/SENSOR_BASELINE_OVERLAY_DIR provided; skipping source sensor stage build.'
            echo 'SENSOR_STAGE_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          env OUTPUT_DIR="out/y700-sensor-stage" \
            ARCH="${ARCH:-aarch64}" \
            SENSOR_STAGE_VERSION="${SENSOR_STAGE_VERSION:-20260626.1}" \
            SENSOR_SOURCE_ARCHIVE="${SENSOR_SOURCE_ARCHIVE:-}" \
            SENSOR_SOURCE_DIR="${SENSOR_SOURCE_DIR:-}" \
            SENSOR_BASELINE_OVERLAY_ARCHIVE="${SENSOR_BASELINE_OVERLAY_ARCHIVE:-}" \
            SENSOR_BASELINE_OVERLAY_DIR="${SENSOR_BASELINE_OVERLAY_DIR:-}" \
            SENSOR_STRIP="${SENSOR_STRIP:-1}" \
            bash scripts/ci/build-y700-sensor-stage.sh
          echo 'SENSOR_STAGE_DIR=out/y700-sensor-stage' >> "$GITHUB_ENV"

      - name: Build source haptics stage
        run: |
          set -euo pipefail
          if [ "${BUILD_TB321FU_HAPTICS_STAGE:-0}" != "1" ]; then
            echo 'BUILD_TB321FU_HAPTICS_STAGE is not 1; skipping.'
            echo 'HAPTICS_STAGE_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${HAPTICS_SOURCE_ARCHIVE:-}" ] && [ -z "${HAPTICS_SOURCE_DIR:-}" ]; then
            echo 'No HAPTICS_SOURCE_ARCHIVE/HAPTICS_SOURCE_DIR provided; skipping haptics stage build.'
            echo 'HAPTICS_STAGE_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${KERNEL_SOURCE_ARCHIVE:-}" ] && [ -z "${KERNEL_SOURCE_DIR:-}" ]; then
            echo 'No KERNEL_SOURCE_ARCHIVE/KERNEL_SOURCE_DIR provided; skipping haptics stage build.'
            echo 'HAPTICS_STAGE_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${KERNEL_BUILD_ARCHIVE:-}" ] && [ -z "${KERNEL_BUILD_DIR:-}" ]; then
            echo 'No KERNEL_BUILD_ARCHIVE/KERNEL_BUILD_DIR provided; skipping haptics stage build.'
            echo 'HAPTICS_STAGE_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          env OUTPUT_DIR="out/tb321fu-haptics-stage" \
            ARCH="${ARCH:-aarch64}" \
            HAPTICS_STAGE_VERSION="${HAPTICS_STAGE_VERSION:-20260627.1}" \
            HAPTICS_SOURCE_ARCHIVE="${HAPTICS_SOURCE_ARCHIVE:-}" \
            HAPTICS_SOURCE_DIR="${HAPTICS_SOURCE_DIR:-}" \
            KERNEL_SOURCE_ARCHIVE="${KERNEL_SOURCE_ARCHIVE:-}" \
            KERNEL_SOURCE_DIR="${KERNEL_SOURCE_DIR:-}" \
            KERNEL_BUILD_ARCHIVE="${KERNEL_BUILD_ARCHIVE:-}" \
            KERNEL_BUILD_DIR="${KERNEL_BUILD_DIR:-}" \
            HAPTICS_STRIP="${HAPTICS_STRIP:-1}" \
            bash scripts/ci/build-tb321fu-haptics-stage.sh
          echo 'HAPTICS_STAGE_DIR=out/tb321fu-haptics-stage' >> "$GITHUB_ENV"

      - name: Build verified camera stack stage
        run: |
          set -euo pipefail
          if [ "${BUILD_TB321FU_CAMERA_STACK:-0}" != "1" ]; then
            echo 'BUILD_TB321FU_CAMERA_STACK is not 1; skipping.'
            echo 'CAMERA_STACK_STAGE_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          env OUTPUT_DIR="out/tb321fu-camera-stack-stage" \
            ARCH="${ARCH:-aarch64}" \
            CAMERA_STACK_STAGE_VERSION="${CAMERA_STACK_STAGE_VERSION:-20260627.4}" \
            CAMERA_STACK_ARCHIVE="${CAMERA_STACK_ARCHIVE:-}" \
            CAMERA_STACK_DIR="${CAMERA_STACK_DIR:-}" \
            bash scripts/ci/build-tb321fu-camera-stack-stage.sh
          echo 'CAMERA_STACK_STAGE_DIR=out/tb321fu-camera-stack-stage' >> "$GITHUB_ENV"

      - name: Build rootfs image
        run: |
          set -euo pipefail
          sudo --preserve-env=OUTPUT_PREFIX,ARCH,ROOTFS_TARBALL_URL,ROOTFS_TARBALL_PATH,PACMAN_MIRROR,ARCH_LINUXARM_REPO,ROOTFS_IMAGE_SIZE,ROOTFS_FSTYPE,ROOTFS_F2FS_OPTIONS,ROOTFS_UUID,ROOTFS_LABEL,ROOTFS_PARTLABEL,HOSTNAME_NAME,DEFAULT_USER_NAME,DEFAULT_USER_PASSWORD,ROOT_PASSWORD_MODE,ROOT_PASSWORD,USER_SUDO_MODE,TZ_REGION,LOCALES,LANG_NAME,PACKAGE_LIST,DESKTOP_ENV,OVERLAY_ARCHIVE,OVERLAY_DIR,PKG_ARCHIVE,PKG_DIR,SENSOR_STAGE_DIR,HAPTICS_STAGE_DIR,CAMERA_STACK_STAGE_DIR,BUILD_TB321FU_GPU_SENSOR,TB321FU_GPU_SENSOR_SOURCE_DIR,TB321FU_GPU_SENSOR_BUILD_JOBS,INSTALL_GNOME_SNAPSHOT,INSTALL_FCITX5_CHINESE,FCITX5_CHINESE_PACKAGES,APPLY_Y700_FIRMWARE_FIXES,APPLY_Y700_AUDIO_POLICY_FIXES,SDDM_AUTOLOGIN,SDDM_AUTOLOGIN_SESSION,MKINITCPIO_PRESETS,MKINITCPIO_MODULES,MKINITCPIO_HOOKS,CLEAN_PACMAN_CACHE,COMPRESS,CHUNK_SIZE,KEEP_RAW_IMAGE \
            env OUTPUT_DIR="$OUTPUT_DIR_ROOTFS" SENSOR_STAGE_DIR="${SENSOR_STAGE_DIR:-}" HAPTICS_STAGE_DIR="${HAPTICS_STAGE_DIR:-}" CAMERA_STACK_STAGE_DIR="${CAMERA_STACK_STAGE_DIR:-}" bash scripts/ci/build-rootfs-image.sh
          sudo chown -R "$USER:$USER" out

      - name: Build GRUB boot image
        run: |
          set -euo pipefail
          env OUTPUT_DIR="$OUTPUT_DIR_GRUB" \
            OUTPUT_PREFIX="$OUTPUT_PREFIX" \
            BOOT_IMAGE_SIZE="${BOOT_IMAGE_SIZE:-}" \
            BOOT_FAT_BITS="${BOOT_FAT_BITS:-}" \
            BOOT_FAT_LABEL="${BOOT_FAT_LABEL:-}" \
            BOOT_SECTOR_SIZE="${BOOT_SECTOR_SIZE:-}" \
            BOOT_CLUSTER_SECTORS="${BOOT_CLUSTER_SECTORS:-}" \
            BOOT_PARTLABEL="${BOOT_PARTLABEL:-}" \
            KERNEL_ARTIFACT_ARCHIVE="${KERNEL_ARTIFACT_ARCHIVE:-}" \
            BOOTAA64_EFI_URL="${BOOTAA64_EFI_URL:-}" \
            QCOMRAMP_EFI_URL="${QCOMRAMP_EFI_URL:-}" \
            QCOMRAMP_CFG_NAME="${QCOMRAMP_CFG_NAME:-}" \
            DTB_NAME="${DTB_NAME:-}" \
            ROOT_SELECTOR="${ROOT_SELECTOR:-}" \
            ROOT_PARTLABEL="${ROOT_PARTLABEL:-}" \
            ROOT_UUID="${ROOT_UUID:-}" \
            ROOTARGS="${ROOTARGS:-}" \
            ROOTARGS_EXTRA="${ROOTARGS_EXTRA:-}" \
            STABLEARGS="${STABLEARGS:-}" \
            GRUB_TIMEOUT="${GRUB_TIMEOUT:-}" \
            INCLUDE_FALLBACK_KERNEL="${INCLUDE_FALLBACK_KERNEL:-}" \
            FALLBACK_KERNEL_VERSION="${FALLBACK_KERNEL_VERSION:-}" \
            BOOT_COMPRESS="${BOOT_COMPRESS:-}" \
            BOOT_CHUNK_SIZE="${BOOT_CHUNK_SIZE:-}" \
            KEEP_BOOT_IMAGE="${KEEP_BOOT_IMAGE:-}" \
            Y700_GRUB_BUILD_DIR="${Y700_GRUB_BUILD_DIR:-}" \
            ROOTFS_IMAGE="out/ci-rootfs/${OUTPUT_PREFIX}-rootfs.img" \
            bash scripts/ci/build-grub-image.sh
          sudo chown -R "$USER:$USER" out

      - name: Write combined checksums
        run: |
          set -euo pipefail
          mkdir -p out/ci-release
          checksum_dirs=("$OUTPUT_DIR_ROOTFS" "$OUTPUT_DIR_GRUB")
          if [ -d out/y700-sensor-stage ]; then
            checksum_dirs+=(out/y700-sensor-stage)
          fi
          if [ -d out/tb321fu-haptics-stage ]; then
            checksum_dirs+=(out/tb321fu-haptics-stage)
          fi
          if [ -d out/tb321fu-camera-stack-stage ]; then
            checksum_dirs+=(out/tb321fu-camera-stack-stage)
          fi
          find "${checksum_dirs[@]}" -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > out/ci-release/SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_prefix }}-rootfs-grub
          path: |
            out/ci-rootfs/*
            out/ci-grub/*
            out/y700-sensor-stage/*
            out/tb321fu-haptics-stage/*
            out/tb321fu-camera-stack-stage/*
            out/ci-release/SHA256SUMS.txt

      - name: Upload release assets
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          release_dir=out/ci-release/assets
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          select_release_asset() {
            local source_dir=$1
            local source_prefix=$2
            local release_name=$3
            local compress=$4
            local chunk_size=$5
            local suffix src dest

            case "$compress" in
              none) suffix=.img; src="$source_dir/$source_prefix" ;;
              zstd) suffix=.img.zst; src="$source_dir/$source_prefix.zst" ;;
              xz) suffix=.img.xz; src="$source_dir/$source_prefix.xz" ;;
              7z)
                if [ -n "$chunk_size" ]; then
                  echo "Release upload expects a single $release_name archive; clear CHUNK_SIZE/BOOT_CHUNK_SIZE instead of using 7z volumes." >&2
                  exit 1
                fi
                suffix=.img.7z
                src="$source_dir/$source_prefix.7z"
                ;;
              *) echo "unsupported $release_name compression: $compress" >&2; exit 1 ;;
            esac

            [ -f "$src" ] || { echo "missing release $release_name asset: $src" >&2; exit 1; }
            dest="$release_dir/${release_name}${suffix}"
            cp -a "$src" "$dest"
          }

          select_release_asset "$OUTPUT_DIR_ROOTFS" "${OUTPUT_PREFIX}-rootfs.img" rootfs "${COMPRESS:-7z}" "${CHUNK_SIZE:-}"
          select_release_asset "$OUTPUT_DIR_GRUB" "${OUTPUT_PREFIX}-grub-fat.img" grub "${BOOT_COMPRESS:-7z}" "${BOOT_CHUNK_SIZE:-}"

          split_large_release_assets() {
            local max_bytes=1992294400
            local asset size

            while IFS= read -r -d '' asset; do
              size=$(stat -c '%s' "$asset")
              if [ "$size" -le "$max_bytes" ]; then
                continue
              fi
              echo "Splitting release asset larger than GitHub's 2GB limit: $asset ($size bytes)"
              split -b 1900M -d -a 3 "$asset" "$asset."
              rm -f "$asset"
            done < <(find "$release_dir" -maxdepth 1 -type f -print0)
          }

          split_large_release_assets
          (cd "$release_dir" && sha256sum * > SHA256SUMS.txt)

          notes=out/ci-release/BUILD-PARAMETERS.md
          rootfs_notes=out/ci-release/rootfs-config-for-notes.txt
          boot_notes=out/ci-release/boot-config-for-notes.txt
          source_notes=out/ci-release/source-config-for-notes.txt
          cp "${BUILD_CONFIG_NOTES_DIR:?}/rootfs.env" "$rootfs_notes"
          cp "${BUILD_CONFIG_NOTES_DIR:?}/boot.env" "$boot_notes"
          cp "${BUILD_CONFIG_NOTES_DIR:?}/source.env" "$source_notes"
          {
            echo '# Build Parameters'
            echo
            echo "- Output prefix: \`$OUTPUT_PREFIX\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Workflow run: \`$GITHUB_RUN_ID\`"
            echo "- Generated: \`$(date -u -Iseconds)\`"
            echo
            echo 'Password-like values are redacted in these release notes.'
            echo 'The release asset names are intentionally short: `rootfs.img.7z` and `grub.img.7z`, with split rootfs parts such as `rootfs.img.7z.000` / `rootfs.img.7z.001`.'
            echo 'Assets ending in `.NNN` are split only to satisfy the GitHub Release 2GB per-asset limit. Recombine them in lexical order before extraction, for example: `cat rootfs.img.7z.* > rootfs.img.7z`.'
            echo
            echo '## rootfs_config'
            echo '```text'
            cat "$rootfs_notes"
            echo '```'
            echo
            echo '## boot_config'
            echo '```text'
            cat "$boot_notes"
            echo '```'
            echo
            echo '## source_config'
            echo '```text'
            cat "$source_notes"
            echo '```'
          } > "$notes"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$notes"
            release_id=$(gh api "repos/${GITHUB_REPOSITORY:?}/releases/tags/$RELEASE_TAG" --jq .id)
            gh api -X PATCH "repos/${GITHUB_REPOSITORY:?}/releases/$release_id" -F draft=false -F prerelease=false -F make_latest=true >/dev/null
            while IFS= read -r asset_name; do
              [ -n "$asset_name" ] || continue
              gh release delete-asset "$RELEASE_TAG" "$asset_name" -y || true
            done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
          else
            gh release create "$RELEASE_TAG" --latest --title "$RELEASE_TAG" --notes-file "$notes"
            release_id=$(gh api "repos/${GITHUB_REPOSITORY:?}/releases/tags/$RELEASE_TAG" --jq .id)
            gh api -X PATCH "repos/${GITHUB_REPOSITORY:?}/releases/$release_id" -F draft=false -F prerelease=false -F make_latest=true >/dev/null
          fi

          gh release upload "$RELEASE_TAG" "$release_dir"/* --clobber
